# 内置规则，可匹配局域网IP地址和.local后缀，该规则集会触发DNS请求。
RULE-SET,LAN,DIRECT,no-resolve
# 内置规则，可匹配大部分Mac和IOS系统请求，不匹配内容请求
RULE-SET,SYSTEM,DIRECT // 系统请求
# GEOIP等于CN，走直连
GEOIP,CN,DIRECT
# DNS 查询失败走Final规则
FINAL,节点选择,dns-failed

[MITM]
skip-server-cert-verify = true
h2 = true
